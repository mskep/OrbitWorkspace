name: Commit Lint

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - edited
  push:
    branches:
      - main

jobs:
  lint-commits:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Lint PR commit messages
        if: github.event_name == 'pull_request'
        run: |
          npx -y -p @commitlint/cli -p @commitlint/config-conventional commitlint \
            --config orbit-workspace/commitlint.config.cjs \
            --from "${{ github.event.pull_request.base.sha }}" \
            --to "${{ github.event.pull_request.head.sha }}" \
            --verbose

      - name: Lint push commit messages
        if: github.event_name == 'push' && github.event.before != '0000000000000000000000000000000000000000'
        run: |
          BEFORE="${{ github.event.before }}"
          AFTER="${{ github.sha }}"

          if git rev-parse "${BEFORE}^{commit}" >/dev/null 2>&1 && git merge-base --is-ancestor "${BEFORE}" "${AFTER}"; then
            npx -y -p @commitlint/cli -p @commitlint/config-conventional commitlint \
              --config orbit-workspace/commitlint.config.cjs \
              --from "${BEFORE}" \
              --to "${AFTER}" \
              --verbose
          else
            echo "Invalid or rewritten push range (${BEFORE}..${AFTER}), linting latest commit only."
            if git rev-parse "${AFTER}~1^{commit}" >/dev/null 2>&1; then
              npx -y -p @commitlint/cli -p @commitlint/config-conventional commitlint \
                --config orbit-workspace/commitlint.config.cjs \
                --from "${AFTER}~1" \
                --to "${AFTER}" \
                --verbose
            else
              npx -y -p @commitlint/cli -p @commitlint/config-conventional commitlint \
                --config orbit-workspace/commitlint.config.cjs \
                --last \
                --verbose
            fi
          fi
